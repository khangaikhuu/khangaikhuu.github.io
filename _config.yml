title: My Jekyll Blog
description: A simple blog built with Jekyll.
baseurl: ""
url: "https://khangaikhuu.github.io"
og_image: /assets/img/profile-pic.jpg

header:
  pages:
    - name: Home
      slug: /
    - name: Blog
      slug: /blog
    - name: About
      slug: /about

footer:
  show_powered_by: true
  contact:
    - type: email
      name: Email
      value: your-email@example.com
  follow:
    - type: github
      name: GitHub
      link: https://github.com/khangaikhuu
    - type: rss
      name: RSS
      link: /feed.xml

# Build settings
markdown: kramdown
theme: bay_jekyll_theme
plugins:
  - jekyll-feed
sass:
  style: :compressed

# Collections and defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - feed.xml
  - gemfiles/
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - elm-stuff/
  - archive/
